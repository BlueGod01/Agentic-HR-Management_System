version: '3.9'

services:

  # ── PostgreSQL (Production DB) ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: hr_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hr_system_db
      POSTGRES_USER: hr_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hr_secure_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hr_user -d hr_system_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hr_network

  # ── Redis Cache ────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hr_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - hr_network

  # ── Backend API ────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hr_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://hr_user:${POSTGRES_PASSWORD:-hr_secure_pass}@postgres:5432/hr_system_db
      REDIS_URL: redis://redis:6379/0
      APP_ENV: production
      DEBUG: "false"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/logs:/app/logs
    networks:
      - hr_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
        VITE_APP_NAME: "HR Assistant"
    container_name: hr_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - hr_network

  # ── NGINX Reverse Proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: hr_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - hr_network

volumes:
  postgres_data:
  redis_data:

networks:
  hr_network:
    driver: bridge
